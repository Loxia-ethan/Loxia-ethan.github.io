<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Here Have a Cookie!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .cookie-container {
            text-align: center;
        }
        
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        form input,
        form textarea {
            width: 300px;
        }
        
        h1 {
            color: #FFD700;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.3);
        }
        
        .cookie-image {
            width: 300px;
            height: 300px;
            margin-bottom: 30px;
            border-radius: 10px;
        }
        
        p {
            color: #FFD700;
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        a {
            color: #FFD700;
            text-decoration: none;
            font-size: 18px;
            padding: 10px 20px;
            border: 2px solid #FFD700;
            border-radius: 5px;
            transition: 0.3s;
        }
        
        a:hover {
            background-color: #FFD700;
            color: black;
        }
    </style>
</head>
<body>
    <div class="cookie-container">
        <h1>Here Have a Cookie! 🍪</h1>
        <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=400" alt="Delicious Cookie" class="cookie-image">
        <p>Thanks for subscribing and reaching out!</p>
        <a href="Project.html">Back to Home</a>
    </div>
</body>
</html>
